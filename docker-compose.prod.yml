version: "3.9"

# Production compose for GCP e2-micro (1 GB RAM).
# Postgres is hosted on Neon (external). Jaeger is disabled — set
# OTEL_SDK_DISABLED=true or point OTEL_EXPORTER_OTLP_ENDPOINT at Grafana Cloud.
# Images are pulled from GHCR (built and pushed by GitHub Actions).

services:
  # ── MCP server ───────────────────────────────────────────────────────────
  mcp-server:
    image: ghcr.io/${GITHUB_REPOSITORY}/mcp-server:latest
    restart: unless-stopped
    environment:
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      SANDBOX_IMAGE: python:3.11-slim
      SANDBOX_TIMEOUT_SECONDS: "10"
      SANDBOX_MEMORY_LIMIT: 128m
      MCP_TRANSPORT: http
      LOG_LEVEL: INFO
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "127.0.0.1:8001:8001"

  # ── Agent ────────────────────────────────────────────────────────────────
  agent:
    image: ghcr.io/${GITHUB_REPOSITORY}/agent:latest
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL}
      MCP_SERVER_URL: http://mcp-server:8001
      DEFAULT_BUDGET_USD: "2.00"
      LOG_LEVEL: INFO
      # Disable OTel if no collector is configured; swap for Grafana Cloud endpoint otherwise
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
      OTEL_SERVICE_NAME: agentic-research-assistant
    command: ["sleep", "infinity"]
    depends_on:
      - mcp-server

  # ── Web UI ───────────────────────────────────────────────────────────────
  web:
    image: ghcr.io/${GITHUB_REPOSITORY}/web:latest
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      DATABASE_URL: ${DATABASE_URL}
      MCP_SERVER_URL: http://mcp-server:8001
      DEFAULT_BUDGET_USD: "2.00"
      LOG_LEVEL: INFO
      OTEL_SDK_DISABLED: ${OTEL_SDK_DISABLED:-true}
      OTEL_EXPORTER_OTLP_ENDPOINT: ${OTEL_EXPORTER_OTLP_ENDPOINT:-http://localhost:4317}
      OTEL_SERVICE_NAME: agentic-research-assistant
      RATE_LIMIT_FILE: /data/rate_limits.json
    volumes:
      - web_data:/data
    ports:
      - "127.0.0.1:8080:8080"
    depends_on:
      - mcp-server

volumes:
  web_data:
