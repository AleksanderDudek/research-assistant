# /etc/nginx/sites-available/research-assistant
# Symlink: sudo ln -s $(pwd)/infra/nginx.conf /etc/nginx/sites-available/research-assistant
#           sudo ln -s /etc/nginx/sites-available/research-assistant /etc/nginx/sites-enabled/
#
# After saving: sudo nginx -t && sudo systemctl reload nginx
# Get TLS cert: sudo certbot --nginx -d YOUR_SUBDOMAIN.duckdns.org

server {
    server_name YOUR_SUBDOMAIN.duckdns.org;

    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Required for SSE streaming — disable ALL buffering and compression.
        # gzip must be off: nginx buffers the entire response to compress it,
        # which defeats streaming and causes ERR_INCOMPLETE_CHUNKED_ENCODING.
        proxy_buffering            off;
        proxy_cache                off;
        gzip                       off;

        # Generous timeouts for long research runs (up to 8 min)
        proxy_read_timeout         600s;
        proxy_send_timeout         600s;
        proxy_connect_timeout      10s;

        # Forward real client IP for rate-limiting
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_set_header Host               $host;

        # Keepalive for long-lived SSE connections
        proxy_set_header Connection         '';
        proxy_set_header Upgrade            '';
    }
}
